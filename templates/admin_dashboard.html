<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Becho Bore Kebele</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased">

    <!-- ADMIN NAVBAR -->
    <nav class="bg-slate-950 border-b border-indigo-900/50 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <span class="text-xl font-bold tracking-wider text-indigo-400">ADMIN CONTROL PANEL</span>
                <div class="flex items-center space-x-4">
                    <span class="text-sm text-slate-400 hidden sm:inline">Officer: <strong class="text-white">{{ user.username }}</strong></span>
                    <a href="{% url 'sign_out' %}" class="text-xs bg-indigo-950 hover:bg-indigo-900 text-indigo-300 px-4 py-2 rounded-lg border border-indigo-800 transition">Sign Out</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- MAIN ADMIN CORE -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 space-y-10">
        
        <!-- ANALYTICS COUNTERS -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 sm:gap-6">
            <div class="bg-slate-800/40 p-5 rounded-xl border border-slate-800 text-center sm:text-left">
                <p class="text-xs font-semibold uppercase tracking-wider text-slate-500">Total Issues</p>
                <p class="text-2xl sm:text-3xl font-black text-white mt-1">42</p>
            </div>
            <div class="bg-slate-800/40 p-5 rounded-xl border border-slate-800 text-center sm:text-left">
                <p class="text-xs font-semibold uppercase tracking-wider text-amber-500">Pending</p>
                <p class="text-2xl sm:text-3xl font-black text-amber-400 mt-1">12</p>
            </div>
            <div class="bg-slate-800/40 p-5 rounded-xl border border-slate-800 text-center sm:text-left">
                <p class="text-xs font-semibold uppercase tracking-wider text-blue-500">In Progress</p>
                <p class="text-2xl sm:text-3xl font-black text-blue-400 mt-1">18</p>
            </div>
            <div class="bg-slate-800/40 p-5 rounded-xl border border-slate-800 text-center sm:text-left">
                <p class="text-xs font-semibold uppercase tracking-wider text-emerald-500">Resolved</p>
                <p class="text-2xl sm:text-3xl font-black text-emerald-400 mt-1">12</p>
            </div>
        </div>

        <!-- LOWER HUB: REPORTS LIST & ANNOUNCEMENT FORM -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- REPORTS MANAGER TABLE (2 COLS LARGE) -->
            <div class="bg-slate-800/40 border border-slate-800 rounded-2xl p-6 lg:col-span-2 space-y-4 overflow-hidden">
                <h3 class="text-lg font-bold text-white">Recent Incoming Reports</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm text-slate-300">
                        <thead class="text-xs uppercase bg-slate-900 text-slate-400 border-b border-slate-800">
                            <tr>
                                <th class="py-3 px-4">Citizen</th>
                                <th class="py-3 px-4">Issue Title</th>
                                <th class="py-3 px-4">Status</th>
                                <th class="py-3 px-4 text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-800/60">
                            <tr>
                                <td class="py-3.5 px-4 font-medium text-white">Kebede Alemu</td>
                                <td class="py-3.5 px-4">Broken Water Pipe</td>
                                <td class="py-3.5 px-4"><span class="text-blue-400 text-xs font-semibold">In Progress</span></td>
                                <td class="py-3.5 px-4 text-right"><button class="text-xs text-indigo-400 hover:underline">Manage</button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- BULLETIN POSTER FORM (1 COL) -->
            <div class="bg-slate-800/40 border border-slate-800 rounded-2xl p-6 space-y-5">
                <h3 class="text-lg font-bold text-white">Publish New Bulletin</h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-1.5">Bulletin Title</label>
                        <input type="text" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-500 text-white" placeholder="Enter notice title...">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 mb-1.5">Detailed Notice Description</label>
                        <textarea rows="4" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-500 text-white" placeholder="Write message to citizens..."></textarea>
                    </div>
                    <button class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-xl text-sm transition">
                        Broadcast to Residents
                    </button>
                </div>
            </div>

        </div>
    </main>

</body>
</html>
