<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Account - Becho Bore Kebele</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .auth-bg {
            background-image: linear-gradient(rgba(15, 23, 42, 0.75), rgba(15, 23, 42, 0.85)), url('https://images.unsplash.com/photo-1627581576426-5b48bcbcfa7d?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased auth-bg min-h-screen flex flex-col justify-between">

    <!-- TOP MINI NAVBAR -->
    <header class="p-6 max-w-7xl mx-auto w-full flex justify-between items-center z-10">
        <a href="{% url 'home' %}" class="text-xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-500">
            BECHO BORE KEBELE
        </a>
        <a href="{% url 'home' %}" class="text-sm text-slate-400 hover:text-white transition flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Back to Home
        </a>
    </header>

    <!-- CENTER SECURITY MAIN CARD -->
    <main class="w-full max-w-md mx-auto p-4 z-10 my-auto">
        <div class="bg-slate-800/80 backdrop-blur-md border border-slate-700/60 p-8 rounded-2xl shadow-2xl space-y-6">
            
            <!-- TAB TOGGLES -->
            <div class="flex border-b border-slate-700 pb-1">
                <button id="loginTab" onclick="switchTab('login')" class="flex-1 text-center pb-3 font-bold text-emerald-400 border-b-2 border-emerald-400 transition duration-200">Sign In</button>
                <button id="registerTab" onclick="switchTab('register')" class="flex-1 text-center pb-3 font-bold text-slate-400 hover:text-slate-200 transition duration-200">Register</button>
            </div>

            <!-- DYNAMIC MESSAGES ALERT -->
            {% if messages %}
                {% for message in messages %}
                    {% if message.tags == 'success' %}
                        <!-- Success Alerts (Green) -->
                        <div class="p-3 rounded-xl text-xs font-medium border bg-emerald-500/10 text-emerald-400 border-emerald-500/20 flex items-center gap-2">
                            <svg class="w-4 h-4 text-emerald-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            {{ message }}
                        </div>
                    {% else %}
                        <!-- Error Alerts (Amber/Red) -->
                        <div class="p-3 rounded-xl text-xs font-medium border bg-amber-500/10 text-amber-400 border-amber-500/20 flex items-center gap-2">
                            <svg class="w-4 h-4 text-amber-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                            {{ message }}
                        </div>
                    {% endif %}
                {% endfor %}
            {% endif %}

            <!-- 1. SIGN IN FORM -->
            <form id="loginForm" method="POST" action="" class="space-y-4">
                {% csrf_token %}
                <input type="hidden" name="action" value="login">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1.5">Username</label>
                    <input type="text" name="username" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-emerald-500 text-white" placeholder="Enter username...">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1.5">Password</label>
                    <input type="password" name="password" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-emerald-500 text-white" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:opacity-90 text-white font-bold py-3.5 rounded-xl text-sm transition shadow-lg shadow-emerald-950/40">
                    Secure Sign In
                </button>
            </form>

            <!-- 2. SIGN UP FORM (REGISTER) -->
            <form id="registerForm" method="POST" action="" class="space-y-4 hidden">
                {% csrf_token %}
                <input type="hidden" name="action" value="register">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1.5">Username </label>
                    <input type="text" name="username" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-emerald-500 text-white" placeholder="Choose unique username...">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1.5">Phone Number</label>
                    <input type="text" name="phone_number" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-emerald-500 text-white" placeholder="e.g. 0912345678">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1.5">FAN </label>
                    <input type="text" name="fan" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-emerald-500 text-white" placeholder="Enter unique FAN...">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 mb-1.5">Password</label>
                    <input type="password" name="password" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-emerald-500 text-white" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-teal-500 to-emerald-600 hover:opacity-90 text-white font-bold py-3.5 rounded-xl text-sm transition shadow-lg shadow-emerald-950/40">
                    Submit Registration
                </button>
            </form>

        </div>
    </main>

    <!-- BOTTOM MINI FOOTER -->
    <footer class="p-6 text-center text-xs text-slate-500 z-10">
        &copy; 2026 Becho Bore Kebele. End-to-End Encrypted Session.
    </footer>

    <!-- INTERACTION JAVASCRIPT -->
    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const mode = urlParams.get('mode');
            if (mode === 'register') {
                switchTab('register');
            } else {
                switchTab('login');
            }
        }

        function switchTab(type) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const loginTab = document.getElementById('loginTab');
            const registerTab = document.getElementById('registerTab');

            if (type === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                loginTab.className = "flex-1 text-center pb-3 font-bold text-emerald-400 border-b-2 border-emerald-400 transition duration-200";
                registerTab.className = "flex-1 text-center pb-3 font-bold text-slate-400 hover:text-slate-200 transition duration-200";
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                loginTab.className = "flex-1 text-center pb-3 font-bold text-slate-400 hover:text-slate-200 transition duration-200";
                registerTab.className = "flex-1 text-center pb-3 font-bold text-emerald-400 border-b-2 border-emerald-400 transition duration-200";
            }
        }
    </script>
</body>
</html>
